<!DOCTYPE html>
<html lang="pl">
  
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekcja 40 - przyciski i ikony</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  
<button type="button" class="btn btn-primary mt-3">Przycisk 1</button>
<button type="button">Przycisk 2</button>

<button type="button" class="btn btn-primary">Primary</button>
<button type="button" class="btn btn-secondary">Secondary</button>
<button type="button" class="btn btn-success">Success</button>
<button type="button" class="btn btn-warning">Warning</button>
<button type="button" class="btn btn-danger">Danger</button>
<button type="button" class="btn btn-info">Info</button>
<button type="button" class="btn btn-light">Light</button>
<button type="button" class="btn btn-dark">Dark</button>

<button type="button" class="btn btn-outline-primary">Primary</button>
<button type="button" class="btn btn-outline-secondary">Secondary</button>
<button type="button" class="btn btn-outline-success">Success</button>
<button type="button" class="btn btn-outline-warning">Warning</button>
<button type="button" class="btn btn-outline-danger">Danger</button>
<button type="button" class="btn btn-outline-info">Info</button>
<button type="button" class="btn btn-outline-light">Light</button>
<button type="button" class="btn btn-outline-dark">Dark</button>

<div class="container mt-5">
  <h2>Przykładowe przyciski Bootstrap</h2>
  <div class="mb-3">
    <button type="button" class="btn btn-primary">Standardowy przycisk</button>
  </div>
  <div class="mb-3">
    <button type="button" class="btn btn-primary btn-lg">Duży przycisk</button>
  </div>
  <div class="mb-3">
    <button type="button" class="btn btn-primary btn-sm">Mały przycisk</button>
  </div>
  <div class="mb-3">
    <button type="button" class="btn btn-primary btn-block">Pełna szerokość</button>
  </div>
</div>
<i class="bi bi-piggy-bank"></i>

<div class="container mt-5">
  <h2>Przykłady przycisków z ikonami</h2>
  <button type="button" class="btn btn-primary mt-3">
    <i class="bi bi-star-fill"></i> Dodaj do ulubionych
  </button>
  
  <button type="button" class="btn btn-success mt-3">
    <i class="bi bi-check-circle"></i> Zatwierdź
  </button>
  
  <button type="button" class="btn btn-warning mt-3">
    Ostrzeżenie <i class="bi bi-exclamation-triangle"></i>
  </button>
</div>

<div class="btn-group m-5">
  <button type="button" class="btn btn-secondary">
    <i class="bi bi-arrow-left"></i>
  </button>
  <button type="button" class="btn btn-secondary">
    <i class="bi bi-house"></i>
  </button>
  <button type="button" class="btn btn-secondary">
    <i class="bi bi-arrow-right"></i>
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
